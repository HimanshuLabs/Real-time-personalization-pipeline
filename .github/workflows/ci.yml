name: Project Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-validation:
    name: Python lint and validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Ruff linting
        run: |
          ruff check .

      - name: Run pytest validation
        run: |
          pytest -q

  docker-build:
    name: FastAPI Docker build validation
    runs-on: ubuntu-latest
    needs: python-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build FastAPI Docker image
        run: |
          docker build -f api/Dockerfile -t project1-feature-api:ci .
