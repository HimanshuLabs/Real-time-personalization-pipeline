global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fastapi"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: "kafka-exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:9308"]

  - job_name: "feature-freshness-exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:8001"]
