[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    ".git",
    ".github",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "venv",
    "venv-airflow",
    "airflow_home",
    "data",
    "logs",
    "checkpoints",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = [
    "E501",
    "F401",
]
